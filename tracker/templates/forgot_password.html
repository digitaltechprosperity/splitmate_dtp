<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --primary:#3b82f6;
            --primary-dark:#2563eb;
            --text:#1f2937;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:
                linear-gradient(135deg, rgba(0,0,0,.65), rgba(0,0,0,.75)),
                url("https://images.unsplash.com/photo-1498050108023-c5249f4df085");
            background-size:cover;
            background-position:center;
            min-height:100vh;
            margin:0;
        }

        .auth-wrapper{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .auth-card{
            width:100%;
            max-width:430px;
            backdrop-filter: blur(14px);
            background: rgba(255,255,255,0.92);
            border-radius:18px;
            padding:40px;
            box-shadow:0 20px 60px rgba(0,0,0,.35);
        }

        .auth-title{
            font-weight:700;
            color:var(--text);
            margin-bottom:10px;
        }

        .auth-subtitle{
            color:#6b7280;
            font-size:14px;
            margin-bottom:28px;
            text-align:center;
        }

        .form-label{
            font-weight:500;
            color:#374151;
        }

        .form-control{
            border-radius:12px !important;
            padding:12px 14px;
            border:1px solid #d1d5db;
            background:#f9fafb;
        }

        .btn-reset{
            margin-top:10px;
            border-radius:999px;
            padding:12px;
            font-weight:600;
            background:var(--primary);
            border:none;
            color:white;
        }

        .btn-reset:hover{
            background:var(--primary-dark);
        }

        .back-link{
            font-weight:500;
            color:#2563eb;
            text-decoration:none;
        }

        .back-link:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="text-center auth-title">Forgot Password</h2>
        <p class="auth-subtitle">
            Enter your username or Gmail. We’ll send a password reset link if the account exists.
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username or Gmail</label>
                <input
                    type="text"
                    name="identifier"
                    class="form-control"
                    placeholder="Enter username or Gmail"
                    required
                    autofocus
                >
            </div>

            <button type="submit" class="btn btn-reset w-100">
                Send Reset Link
            </button>
        </form>

        <p class="text-center mt-4 mb-0">
            <a class="back-link" href="{% url 'login' %}">
                Back to login
            </a>
        </p>
    </div>
</div>

</body>
</html>
