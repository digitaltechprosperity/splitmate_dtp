<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Members</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            margin:0;
            background:#fff;
            font-family:Poppins, Arial, sans-serif;
            color:#2f3437;
        }

        .mobile-shell{
            max-width:520px;
            margin:0 auto;
            min-height:100vh;
            background:#fff;
            position:relative;
            padding-bottom:110px;
        }

        .top-bar{
            height:72px;
            display:flex;
            align-items:center;
            gap:18px;
            padding:0 22px;
            border-bottom:1px solid #e5e7eb;
        }

        .back-link{
            color:#2f3437;
            font-size:26px;
            text-decoration:none;
        }

        .search-title{
            font-size:20px;
            color:#7b8188;
            font-weight:400;
        }

        .selected-strip{
            display:flex;
            gap:18px;
            overflow-x:auto;
            padding:22px 20px 18px;
            border-bottom:1px solid #d8dde3;
        }

        .selected-person{
            text-align:center;
            position:relative;
            min-width:74px;
        }

        .selected-avatar{
            width:64px;
            height:64px;
            border-radius:50%;
            background:linear-gradient(135deg,#2563eb,#14b8a6);
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:24px;
            font-weight:700;
            margin:auto;
        }

        .remove-dot{
            position:absolute;
            right:2px;
            top:0;
            width:24px;
            height:24px;
            border-radius:50%;
            background:#8b96a1;
            color:#fff;
            font-size:15px;
            display:flex;
            align-items:center;
            justify-content:center;
        }

        .selected-name{
            margin-top:8px;
            font-size:14px;
            color:#444;
        }

        .add-new-row{
            display:flex;
            align-items:center;
            gap:22px;
            padding:24px 26px;
            text-decoration:none;
            color:#2f3437;
            border-bottom:1px solid #eef0f2;
        }

        .add-new-row i{
            font-size:26px;
        }

        .add-new-row span{
            font-size:22px;
            font-weight:400;
        }

        .section-title{
            padding:24px 26px 8px;
            color:#34383d;
            font-size:18px;
            font-weight:500;
        }

        .friend-row{
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:14px;
            padding:14px 26px;
            cursor:pointer;
        }

        .friend-left{
            display:flex;
            align-items:center;
            gap:18px;
        }

        .friend-avatar{
            width:58px;
            height:58px;
            border-radius:50%;
            background:linear-gradient(135deg,#99f6e4,#064e3b);
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:22px;
            font-weight:700;
            flex-shrink:0;
        }

        .friend-name{
            font-size:22px;
            font-weight:400;
            color:#3f4449;
        }

        .friend-email{
            color:#8b949e;
            font-size:14px;
            margin-top:3px;
        }

        .check-icon{
            font-size:30px;
            color:#059669;
            display:none;
        }

        input[type="checkbox"]{
            display:none;
        }

        input[type="checkbox"]:checked + .friend-left + .check-icon{
            display:block;
        }

        .bottom-bar{
            position:fixed;
            left:50%;
            bottom:0;
            transform:translateX(-50%);
            width:min(520px,100%);
            background:#f1f2f7;
            padding:18px 20px 24px;
        }

        .next-btn{
            width:100%;
            border:none;
            background:#00916e;
            color:#fff;
            border-radius:999px;
            padding:18px;
            font-size:22px;
            font-weight:600;
        }

        .empty-box{
            padding:30px 26px;
            color:#8b949e;
        }
    </style>
</head>
<body>

<div class="mobile-shell">
    <form method="POST">
        {% csrf_token %}

        <div class="top-bar">
            <a href="{% url 'group_detail' group.id %}" class="back-link">
                <i class="bi bi-arrow-left"></i>
            </a>
            <div class="search-title">Enter name or Gmail</div>
        </div>

        <div class="selected-strip" id="selectedStrip">
            <!-- JS will fill selected friends here -->
        </div>

        <a href="{% url 'group_add_friend' group.id %}" class="add-new-row">
            <i class="bi bi-person-plus"></i>
            <span>Add a new Gmail contact</span>
        </a>

        <div class="section-title">Friends</div>

        {% if friends %}
            {% for friend in friends %}
                <label class="friend-row" data-name="{{ friend.name }}">
                    <input
                        type="checkbox"
                        name="members"
                        value="{{ friend.id }}"
                        data-name="{{ friend.name }}"
                        data-email="{{ friend.email }}"
                        {% if friend.id|stringformat:"s" in selected_ids %}checked{% endif %}
                    >

                    <div class="friend-left">
                        <div class="friend-avatar">
                            {{ friend.name|first|upper }}
                        </div>
                        <div>
                            <div class="friend-name">{{ friend.name }}</div>
                            <div class="friend-email">{{ friend.email }}</div>
                        </div>
                    </div>

                    <i class="bi bi-check-lg check-icon"></i>
                </label>
            {% endfor %}
        {% else %}
            <div class="empty-box">
                No friends available. Click “Add a new Gmail contact”.
            </div>
        {% endif %}

        <div class="bottom-bar">
            <button type="submit" class="next-btn">Next</button>
        </div>
    </form>
</div>

<script>
    function renderSelected() {
        const strip = document.getElementById("selectedStrip");
        const checked = document.querySelectorAll('input[name="members"]:checked');

        strip.innerHTML = "";

        checked.forEach(input => {
            const name = input.dataset.name;
            const item = document.createElement("div");
            item.className = "selected-person";
            item.innerHTML = `
                <div class="remove-dot">×</div>
                <div class="selected-avatar">${name.charAt(0).toUpperCase()}</div>
                <div class="selected-name">${name}</div>
            `;

            item.querySelector(".remove-dot").addEventListener("click", function(e){
                e.preventDefault();
                input.checked = false;
                renderSelected();
            });

            strip.appendChild(item);
        });

        if (checked.length === 0) {
            strip.innerHTML = `<div class="text-muted">Select existing friends or add a new Gmail contact.</div>`;
        }
    }

    document.querySelectorAll('input[name="members"]').forEach(input => {
        input.addEventListener("change", renderSelected);
    });

    renderSelected();
</script>

</body>
</html>
