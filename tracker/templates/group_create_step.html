<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Group | SplitMate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            min-height:100vh;
            font-family:'Poppins',sans-serif;
            background:linear-gradient(135deg,#eef4ff,#f8fbff);
            color:#0f172a;
        }

        .app-shell{
            width:min(1050px,94%);
            margin:40px auto;
        }

        .header-card{
            background:#fff;
            border:1px solid #e5edf7;
            border-radius:28px;
            padding:30px;
            box-shadow:0 20px 50px rgba(15,23,42,.08);
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .back-btn{
            width:46px;
            height:46px;
            border-radius:14px;
            background:#eef4ff;
            color:#2563eb;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            text-decoration:none;
            font-size:22px;
        }

        .page-title{
            font-size:32px;
            font-weight:700;
            margin:0;
        }

        .page-subtitle{
            color:#64748b;
            font-size:14px;
            margin-top:6px;
        }

        .step-badge{
            background:#eff6ff;
            color:#2563eb;
            border:1px solid #bfdbfe;
            border-radius:999px;
            padding:10px 16px;
            font-size:13px;
            font-weight:600;
        }

        .content-card{
            margin-top:24px;
            background:#fff;
            border:1px solid #e5edf7;
            border-radius:30px;
            padding:34px;
            box-shadow:0 16px 40px rgba(15,23,42,.06);
        }

        .form-label{
            font-weight:600;
            color:#1e293b;
            margin-bottom:10px;
        }

        .form-control{
            border-radius:18px !important;
            padding:15px 18px !important;
            border:1px solid #dbe5f1 !important;
            background:#f8fbff !important;
            font-size:15px;
        }

        .form-control:focus{
            background:#fff !important;
            border-color:#2563eb !important;
            box-shadow:0 0 0 4px rgba(37,99,235,.12) !important;
        }

        .type-grid{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:16px;
            margin-top:14px;
        }

        .type-card{
            position:relative;
            border:1px solid #e5edf7;
            border-radius:22px;
            padding:22px 18px;
            cursor:pointer;
            background:#fff;
            transition:.25s ease;
            min-height:140px;
        }

        .type-card:hover{
            transform:translateY(-3px);
            box-shadow:0 14px 30px rgba(15,23,42,.08);
            border-color:#bfdbfe;
        }

        .type-card input{
            position:absolute;
            opacity:0;
        }

        .type-icon{
            width:46px;
            height:46px;
            border-radius:15px;
            background:#eef4ff;
            color:#2563eb;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:23px;
            margin-bottom:14px;
        }

        .type-title{
            font-weight:700;
            font-size:16px;
            margin-bottom:4px;
        }

        .type-desc{
            color:#64748b;
            font-size:12px;
            line-height:1.5;
        }

        .type-card:has(input:checked){
            border-color:#2563eb;
            background:linear-gradient(180deg,#eff6ff,#ffffff);
            box-shadow:0 14px 30px rgba(37,99,235,.12);
        }

        .type-card:has(input:checked)::after{
            content:"✓";
            position:absolute;
            top:14px;
            right:14px;
            width:28px;
            height:28px;
            border-radius:50%;
            background:#2563eb;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:700;
        }

        .actions{
            display:flex;
            justify-content:flex-end;
            gap:12px;
            margin-top:30px;
        }

        .btn-soft{
            border:none;
            border-radius:16px;
            padding:13px 22px;
            font-weight:600;
            background:#eef3fb;
            color:#0f172a;
            text-decoration:none;
        }

        .btn-main{
            border:none;
            border-radius:16px;
            padding:13px 24px;
            font-weight:700;
            color:#fff;
            background:linear-gradient(135deg,#2563eb,#3b82f6);
            box-shadow:0 12px 24px rgba(37,99,235,.22);
        }

        @media(max-width:900px){
            .type-grid{
                grid-template-columns:repeat(2,1fr);
            }
        }

        @media(max-width:560px){
            .content-card{
                padding:24px;
            }

            .type-grid{
                grid-template-columns:1fr;
            }

            .actions{
                flex-direction:column-reverse;
            }

            .btn-soft,
            .btn-main{
                width:100%;
                text-align:center;
            }
        }
    </style>
</head>

<body>

<div class="app-shell">

    <div class="header-card">
        <div class="d-flex align-items-center gap-3">
            <a href="{% url 'groups_list' %}" class="back-btn">
                <i class="bi bi-arrow-left"></i>
            </a>

            <div>
                <h1 class="page-title">Create New Group</h1>
                <div class="page-subtitle">
                    Set up your group first. You can add members in the next step.
                </div>
            </div>
        </div>

        <div class="step-badge">
            <i class="bi bi-layers"></i> Step 1 of 3
        </div>
    </div>

    <div class="content-card">

        {% if error %}
            <div class="alert alert-danger rounded-4 mb-4">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-4">
                <label class="form-label">Group Name</label>
                <input
                    type="text"
                    name="name"
                    class="form-control"
                    placeholder="Example: Goa Trip, Flatmates, Office Lunch"
                    required
                    autofocus
                >
            </div>

            <div>
                <label class="form-label">Choose Group Type</label>

                <div class="type-grid">
                    <label class="type-card">
                        <input type="radio" name="group_type" value="trip" checked>
                        <div class="type-icon"><i class="bi bi-airplane"></i></div>
                        <div class="type-title">Trip</div>
                        <div class="type-desc">Best for travel, vacation, and shared trip expenses.</div>
                    </label>

                    <label class="type-card">
                        <input type="radio" name="group_type" value="home">
                        <div class="type-icon"><i class="bi bi-house"></i></div>
                        <div class="type-title">Home</div>
                        <div class="type-desc">Manage rent, groceries, utilities, and flatmate costs.</div>
                    </label>

                    <label class="type-card">
                        <input type="radio" name="group_type" value="couple">
                        <div class="type-icon"><i class="bi bi-heart"></i></div>
                        <div class="type-title">Couple</div>
                        <div class="type-desc">Track shared payments, dates, subscriptions, and bills.</div>
                    </label>

                    <label class="type-card">
                        <input type="radio" name="group_type" value="other">
                        <div class="type-icon"><i class="bi bi-grid"></i></div>
                        <div class="type-title">Other</div>
                        <div class="type-desc">Use this for custom groups and general shared expenses.</div>
                    </label>
                </div>
            </div>

            <div class="actions">
                <a href="{% url 'groups_list' %}" class="btn-soft">Cancel</a>

                <button type="submit" class="btn-main">
                    Continue <i class="bi bi-arrow-right"></i>
                </button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
