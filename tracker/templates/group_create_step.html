<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Group</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body{background:#f4f7fb;font-family:Poppins,Arial,sans-serif;}
        .wrap{width:min(760px,92%);margin:50px auto;}
        .card-box{background:#fff;border-radius:28px;padding:36px;box-shadow:0 10px 30px rgba(15,23,42,.08);}
        .type-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:20px 0;}
        .type-card{border:1px solid #e8edf5;border-radius:20px;padding:20px;cursor:pointer;background:#fff;}
        .type-card input{margin-right:8px;}
        .btn-main{border:none;border-radius:16px;padding:13px 20px;font-weight:600;color:#fff;background:linear-gradient(135deg,#2563eb,#3b82f6);}
        .btn-soft{border:none;border-radius:16px;padding:13px 20px;font-weight:600;background:#eef3fb;color:#0f172a;text-decoration:none;}
    </style>
</head>
<body>
<div class="wrap">
    <div class="card-box">
        <h2 class="fw-bold">Start a New Group</h2>
        <p class="text-muted">Create the group first. Members will be added in the next step.</p>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-4">
                <label class="form-label fw-semibold">Group Name</label>
                <input type="text" name="name" class="form-control form-control-lg rounded-4" placeholder="Example: Milk, Goa Trip, Flatmates" required>
            </div>

            <label class="form-label fw-semibold">Choose Group Type</label>
            <div class="type-grid">
                <label class="type-card">
                    <input type="radio" name="group_type" value="trip" checked>
                    <i class="bi bi-airplane"></i> Trip
                </label>
                <label class="type-card">
                    <input type="radio" name="group_type" value="home">
                    <i class="bi bi-house"></i> Home
                </label>
                <label class="type-card">
                    <input type="radio" name="group_type" value="couple">
                    <i class="bi bi-heart"></i> Couple
                </label>
                <label class="type-card">
                    <input type="radio" name="group_type" value="other">
                    <i class="bi bi-grid"></i> Other
                </label>
            </div>

            <div class="d-flex gap-3 mt-4">
                <a href="{% url 'groups_list' %}" class="btn-soft">Cancel</a>
                <button type="submit" class="btn-main">
                    Next <i class="bi bi-arrow-right"></i>
                </button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
