<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Members</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{background:#f4f7fb;font-family:Poppins,Arial,sans-serif;}
        .wrap{width:min(760px,92%);margin:50px auto;}
        .card-box{background:#fff;border-radius:28px;padding:36px;box-shadow:0 10px 30px rgba(15,23,42,.08);}
        .member-row{border:1px solid #e8edf5;border-radius:18px;padding:14px 16px;margin-bottom:10px;}
        .btn-main{border:none;border-radius:16px;padding:13px 20px;font-weight:600;color:#fff;background:linear-gradient(135deg,#2563eb,#3b82f6);}
        .btn-soft{border:none;border-radius:16px;padding:13px 20px;font-weight:600;background:#eef3fb;color:#0f172a;text-decoration:none;}
    </style>
</head>
<body>
<div class="wrap">
    <div class="card-box">
        <h2 class="fw-bold">Review Members</h2>
        <p class="text-muted">Confirm members for <strong>{{ group.name }}</strong>.</p>

        {% if selected_friends %}
            {% for friend in selected_friends %}
            <div class="member-row">
                <strong>{{ friend.name }}</strong>
                <div class="text-muted small">{{ friend.email }}</div>
            </div>
            {% endfor %}
        {% else %}
            <div class="alert alert-warning">No members selected. Owner will still be part of the group.</div>
        {% endif %}

        <form method="POST" class="mt-4">
            {% csrf_token %}
            <div class="d-flex gap-3">
                <a href="{% url 'group_add_members' group.id %}" class="btn-soft">Back</a>
                <button type="submit" class="btn-main">Create Group</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
