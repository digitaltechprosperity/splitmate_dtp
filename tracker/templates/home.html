{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Poppins', sans-serif;
            margin:0;
            background:#0b0f1a;
            overflow:hidden;
        }

        .navbar{
            background:transparent !important;
            padding-top:20px;
        }

        .navbar-brand{
            color:white !important;
            font-size:26px;
            font-weight:600;
            letter-spacing:1px;
        }

        .hero{
            height:100vh;
            position:relative;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
        }

        .hero::before{
            content:"";
            position:absolute;
            width:100%;
            height:100%;
            background: radial-gradient(circle at 20% 30%, #1b2a49, #0b0f1a 60%);
            z-index:-2;
        }

        .hero::after{
            content:"";
            position:absolute;
            width:100%;
            height:100%;
            background-image:
                linear-gradient(transparent 95%, rgba(255,255,255,0.05) 95%),
                linear-gradient(90deg, transparent 95%, rgba(255,255,255,0.05) 95%);
            background-size: 60px 60px;
            z-index:-1;
        }

        .hero h1{
            font-size:60px;
            font-weight:700;
        }

        .hero p{
            font-size:20px;
            margin-top:15px;
            margin-bottom:35px;
            color:#cfd8ff;
        }

        .btn-custom{
            padding:14px 35px;
            font-size:18px;
            border-radius:40px;
            margin:12px;
            border:none;
            transition:0.3s;
        }

        .btn-success{
            background:linear-gradient(45deg,#1aa860,#2be38c);
            box-shadow:0 0 20px rgba(43,227,140,0.4);
        }

        .btn-success:hover{
            transform:translateY(-3px);
            box-shadow:0 0 30px rgba(43,227,140,0.7);
        }

        .btn-primary{
            background:linear-gradient(45deg,#3b82f6,#6ea8ff);
            box-shadow:0 0 20px rgba(59,130,246,0.4);
        }

        .btn-primary:hover{
            transform:translateY(-3px);
            box-shadow:0 0 30px rgba(59,130,246,0.7);
        }

        .footer{
            position:absolute;
            bottom:15px;
            width:100%;
            text-align:center;
            color:#7a86b6;
            font-size:14px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand" href="/">Expense Tracker web</a>
    </div>
</nav>

<section class="hero">
    <div class="container">
        <h1>Smart Personal Expense Tracker</h1>
        <p>Analyze spending • Track liabilities • Visualize monthly growth</p>

        <a href="{% url 'register' %}" class="btn btn-success btn-custom">Create Account</a>
        <a href="{% url 'login' %}" class="btn btn-primary btn-custom">Sign In</a>
    </div>
</section>

<div class="footer">
    © 2026 Expense Tracker • Django Web Application
</div>

</body>
</html>
