<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --primary:#22c55e;
            --primary-dark:#16a34a;
            --text:#1f2937;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:
                linear-gradient(135deg, rgba(0,0,0,.65), rgba(0,0,0,.75)),
                url("https://images.unsplash.com/photo-1557804506-669a67965ba0");
            background-size:cover;
            background-position:center;
            min-height:100vh;
            margin:0;
        }

        .auth-wrapper{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .auth-card{
            width:100%;
            max-width:460px;
            backdrop-filter: blur(14px);
            background: rgba(255,255,255,0.9);
            border-radius:18px;
            padding:40px;
            box-shadow:
                0 20px 60px rgba(0,0,0,.35),
                0 0 0 1px rgba(255,255,255,.2) inset;
        }

        .auth-title{
            font-weight:700;
            color:var(--text);
            margin-bottom:28px;
        }

        .form-label{
            font-weight:500;
            margin-bottom:6px;
            color:#374151;
        }

        .form-control{
            border-radius:12px !important;
            padding:12px 14px;
            border:1px solid #d1d5db;
            background:#f9fafb;
        }

        .btn-register{
            margin-top:10px;
            border-radius:999px;
            padding:12px;
            font-weight:600;
            background:var(--primary);
            border:none;
            color:white;
        }

        .btn-register:hover{
            background:var(--primary-dark);
        }

        .login-link{
            font-weight:500;
            color:#2563eb;
            text-decoration:none;
        }

        .invite-box{
            background:#ecfdf5;
            border:1px solid #86efac;
            color:#166534;
            border-radius:14px;
            padding:12px 14px;
            margin-bottom:18px;
            font-size:14px;
            font-weight:500;
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="text-center auth-title">Create Account</h2>

        {% if invite_token %}
            <div class="invite-box">
                You are registering to accept a group invite. Please use the invited Gmail address.
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="hidden" name="invite" value="{{ invite_token }}">

            {% if form.errors %}
                <div class="alert alert-danger">
                    {{ form.errors }}
                </div>
            {% endif %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                {{ form.display_name }}
            </div>

            <div class="mb-3">
                <label class="form-label">Gmail Address</label>
                {{ form.email }}
            </div>

            <button type="submit" class="btn btn-register w-100">
                Create Account
            </button>
        </form>

        <p class="text-center mt-4 mb-0">
            Already have an account?
            <a class="login-link" href="{% url 'login' %}{% if invite_token %}?invite={{ invite_token }}{% endif %}">
                Login
            </a>
        </p>
    </div>
</div>

</body>
</html>
