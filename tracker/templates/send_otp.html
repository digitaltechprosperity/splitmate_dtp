<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login with OTP</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root{
            --primary:#3b82f6;
            --primary-dark:#2563eb;
            --text:#1f2937;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:
                linear-gradient(135deg, rgba(0,0,0,.65), rgba(0,0,0,.75)),
                url("https://images.unsplash.com/photo-1498050108023-c5249f4df085");
            background-size:cover;
            background-position:center;
            min-height:100vh;
            margin:0;
        }

        .auth-wrapper{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
        }

        .auth-card{
            width:100%;
            max-width:430px;
            backdrop-filter: blur(14px);
            background: rgba(255,255,255,0.9);
            border-radius:18px;
            padding:40px;
            box-shadow:
                0 20px 60px rgba(0,0,0,.35),
                0 0 0 1px rgba(255,255,255,.2) inset;
            animation:fadeUp .6s ease;
        }

        .auth-title{
            font-weight:700;
            color:var(--text);
            margin-bottom:8px;
        }

        .auth-subtitle{
            color:#6b7280;
            font-size:14px;
            margin-bottom:28px;
        }

        .form-label{
            font-weight:500;
            margin-bottom:6px;
            color:#374151;
        }

        .form-control{
            border-radius:12px !important;
            padding:12px 14px;
            border:1px solid #d1d5db;
            transition:all .25s ease;
            background:#f9fafb;
        }

        .form-control:focus{
            border-color:var(--primary);
            box-shadow:0 0 0 4px rgba(59,130,246,.18);
            background:white;
        }

        .form-control:hover{
            border-color:#9ca3af;
        }

        .btn-primary-custom{
            margin-top:10px;
            border-radius:999px;
            padding:12px;
            font-weight:600;
            background:var(--primary);
            border:none;
            color:white;
            transition:all .25s ease;
        }

        .btn-primary-custom:hover{
            background:var(--primary-dark);
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(59,130,246,.35);
        }

        .back-link{
            font-weight:500;
            color:#6b7280;
            text-decoration:none;
            font-size:14px;
        }

        .back-link:hover{
            color:var(--primary);
            text-decoration:underline;
        }

        @keyframes fadeUp{
            from{opacity:0; transform:translateY(25px);}
            to{opacity:1; transform:translateY(0);}
        }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="auth-card">
        <h2 class="text-center auth-title">Login with OTP</h2>
        <p class="text-center auth-subtitle">Enter your phone number to receive a one-time password</p>

        {% if error %}
            <div class="alert alert-danger rounded-3">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{% url 'send_otp' %}">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input
                    type="tel"
                    name="phone"
                    class="form-control"
                    placeholder="+1 234 567 8900"
                    required
                    autofocus
                >
                <div class="form-text text-muted mt-1" style="font-size:12px;">
                    Include country code (e.g. +91 for India)
                </div>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100">
                Send OTP
            </button>
        </form>

        <p class="text-center mt-4 mb-0">
            <a class="back-link" href="{% url 'login' %}">&larr; Back to login</a>
        </p>
    </div>
</div>

</body>
</html>
