<h2>Verify OTP</h2>

<form method="POST" action="{% url 'verify_otp' %}">
    {% csrf_token %}
    <input type="hidden" name="phone" value="{{ phone }}">
    
    <input type="text" name="otp" placeholder="Enter OTP" required>
    <button type="submit">Verify</button>
</form>

{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}
